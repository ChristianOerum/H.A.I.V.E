# HAIVE — Docker Compose
#
# Runs the HAIVE server plus Watchtower, which automatically checks the registry
# for a newer image and updates + restarts the container when one is available.
#
#   docker compose up -d
#
# There are no environment variables to set — all configuration (HA URL/token,
# WiFi, PIN, allowed LAN prefixes) is entered on the first-launch setup screen
# in the browser and persisted in the `haive-config` volume.

services:
  haive:
    image: christianorum/haive:latest
    # For local builds instead of a registry image, uncomment:
    # build: .
    container_name: haive
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
    volumes:
      # Persist runtime config (device.json) + edited layout/floorplan.
      - haive-config:/app/config
    labels:
      # Only containers with this label are auto-updated by Watchtower.
      - "com.centurylinklabs.watchtower.enable=true"

  # Auto-update: polls for a newer HAIVE image and applies it with zero manual steps.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: haive-watchtower
    restart: unless-stopped
    environment:
      # Modern Docker Engine (25+) rejects Watchtower's default API 1.25; pin
      # to a version the daemon speaks (any 1.40–1.47 works).
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >-
      --label-enable
      --cleanup
      --include-restarting
      --interval 3600

volumes:
  haive-config:
